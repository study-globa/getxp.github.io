<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  
<title>Global Code - Courses</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #111;
  color: orange;
  padding: 20px;
  text-align: center;
}

.container {
  padding: 20px;
}

.course {
  background: white;
  margin: 15px 0;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

h2 {
  margin: 0;
  color: #333;
}

.assignment {
  background: #eef;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>

</head>

<body>

<header>
  <h1>Global Code - Learning Platform</h1>
  <p>Learn HTML, CSS & JavaScript step by step</p>
</header>

<div class="container">

<!-- 20 LESSONS -->
<script>
const courses = [
"Intro to HTML Basics",
"HTML Structure & Tags",
"Links & Images in HTML",
"Forms in HTML",
"HTML Tables",
"CSS Basics",
"CSS Colors & Fonts",
"CSS Box Model",
"CSS Layout (Flexbox)",
"CSS Grid",
"JavaScript Introduction",
"Variables in JS",
"Functions in JS",
"DOM Manipulation",
"Events in JavaScript",
"Loops in JS",
"Arrays & Objects",
"Mini Project 1",
"Mini Project 2",
"Final Project"
];

const descriptions = [
"Learn what HTML is and how websites are structured.",
"Understand basic HTML tags and structure.",
"Learn how to add links and images.",
"Create forms like login pages.",
"Build tables for data display.",
"Learn CSS basics and styling.",
"Work with colors and fonts.",
"Understand spacing and layout control.",
"Build flexible layouts using Flexbox.",
"Create grid-based layouts.",
"Start programming with JavaScript.",
"Learn variables and data storage.",
"Write reusable functions.",
"Manipulate webpage elements.",
"Handle clicks and user actions.",
"Repeat actions using loops.",
"Work with lists of data.",
"Build a small HTML/CSS project.",
"Build a JavaScript interactive project.",

"Create a simple HTML page",

"Day 11", "Day 12", "Day 13", "Day 14", "Day 15",
"Day 16", "Day 17", "Day 18", "Day 19", "Day 20"
];

for (let i = 0; i < 20; i++) {
document.write(`
  <div class="course">
    <h2>Lesson ${i+1}: ${courses[i]}</h2>
    <p>${descriptions[i]}</p>

    <div class="assignment">
      <b>Assignment:</b> ${assignments[i]} <br>
      <b>Due Date:</b> ${dueDates[i]}

}
</script>

</div>

</body>
</html>
