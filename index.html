<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Global Code • Interactive Syllabus Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f0f2f8;
      color: #1e2a3e;
      line-height: 1.5;
    }

    /* header styling */
    .hero-header {
      background: linear-gradient(135deg, #0b1c2c 0%, #1a2f3f 100%);
      color: #ffcd7e;
      padding: 2rem 2rem 1.8rem;
      text-align: center;
      border-bottom: 4px solid #ff9f4a;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .hero-header h1 {
      font-size: 2.6rem;
      letter-spacing: -0.5px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffe6b3, #ffbc6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: none;
    }

    .hero-header p {
      margin-top: 0.6rem;
      font-size: 1.2rem;
      opacity: 0.9;
      font-weight: 400;
    }

    /* main container */
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.8rem;
    }

    /* lesson grid (cards) */
    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.6rem;
      margin-bottom: 2rem;
    }

    .lesson-card {
      background: white;
      border-radius: 1.2rem;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05), 0 2px 5px rgba(0, 0, 0, 0.03);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid #e9edf2;
    }

    .lesson-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
    }

    .card-header {
      background: #ffffff;
      padding: 1.2rem 1.4rem 0.4rem;
      border-bottom: 2px solid #f0eef3;
    }

    .lesson-title {
      font-size: 1.35rem;
      font-weight: 700;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .lesson-num {
      background: #ffd966;
      color: #2d2a1e;
      padding: 0.2rem 0.65rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .lesson-name {
      color: #1e2f3e;
    }

    .desc {
      color: #4a5b6e;
      font-size: 0.9rem;
      padding: 0 1.4rem;
      margin: 0.6rem 0 0.8rem;
      line-height: 1.4;
    }

    .assignment-mini {
      background: #fef7e0;
      margin: 0.6rem 1.4rem;
      padding: 0.8rem 1rem;
      border-radius: 14px;
      border-left: 5px solid #ffaa33;
      font-size: 0.85rem;
    }

    .assignment-mini b {
      color: #b45309;
    }

    .due {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 5px;
    }

    .btn-lesson {
      background: #0f2b3d;
      border: none;
      margin: 0.8rem 1.4rem 1.2rem;
      padding: 0.7rem 0;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.3px;
    }

    .btn-lesson:hover {
      background: #ff9142;
      transform: scale(0.98);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* DETAIL PANEL : opens Lesson 1 info + ideas up to last lesson */
    .detail-panel {
      background: #ffffffdd;
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      margin-top: 1rem;
      transition: 0.2s;
    }

    .detail-card {
      background: #ffffff;
      border-radius: 1.8rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      border: 1px solid #e2e8f0;
      margin-top: 1rem;
    }

    .detail-header {
      background: #1e2f3c;
      padding: 1rem 2rem;
      color: #ffde9c;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .detail-header h3 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .close-detail {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #ffbc6e;
      transition: 0.1s;
    }

    .close-detail:hover {
      color: white;
      transform: scale(1.1);
    }

    .detail-content {
      padding: 1.8rem 2rem 2rem;
      max-height: 65vh;
      overflow-y: auto;
    }

    .info-section {
      margin-bottom: 2rem;
      border-bottom: 1px dashed #cbd5e1;
      padding-bottom: 1.2rem;
    }

    .info-section h4 {
      font-size: 1.4rem;
      color: #ff8c42;
      margin-bottom: 0.6rem;
      display: inline-block;
      border-left: 5px solid #ff8c42;
      padding-left: 12px;
    }

    .ideas-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1rem;
    }

    .idea-chip {
      background: #f1f5f9;
      border-radius: 60px;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1e293b;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .lesson-summary-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin: 1rem 0;
    }

    .lesson-summary-item {
      background: #f8fafc;
      padding: 0.6rem 1rem;
      border-radius: 14px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      border-left: 4px solid #ffaa44;
    }

    .lesson-summary-item strong {
      min-width: 70px;
      color: #c2410c;
    }

    .footnote {
      background: #fef3c7;
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 24px;
      text-align: center;
      font-size: 0.8rem;
    }

    @media (max-width: 680px) {
      .dashboard {
        padding: 1rem;
      }
      .detail-header h3 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>

  // Helper: render all lesson cards in grid
  function renderCards() {
    const container = document.getElementById('lessonsContainer');
    if (!container) return;
    container.innerHTML = '';
    lessonsData.forEach((lesson, idx) => {
      const lessonNum = idx + 1;
      const card = document.createElement('div');
      card.className = 'lesson-card';
      card.innerHTML = `
        <div class="card-header">
          <div class="lesson-title">
            <span class="lesson-num">Lesson ${lessonNum}</span>
            <span class="lesson-name">${escapeHtml(lesson.title)}</span>
          </div>
        </div>
        <div class="desc">${escapeHtml(lesson.desc)}</div>
        <div class="assignment-mini">
          <b>✏️ Assignment:</b> ${escapeHtml(lesson.assignment)}<br>
          <span class="due">📅 ${escapeHtml(lesson.due)}</span>
        </div>
        <button class="btn-lesson" data-lesson-idx="${idx}">
          📖 Lesson ${lessonNum} → Open Full Syllabus
        </button>
      `;
      container.appendChild(card);
    });

    // attach event listeners to all buttons (spec: click lesson 1, but we implement general: each shows full syllabus)
    // but explicit spec: "Click 'Lesson 1' → opens Lesson 1 page and write info and ideas about the topic up to the last lesson"
    // So we guarantee that clicking ANY lesson leads to detailed page showing info+ideas from that lesson up to last lesson? 
    // Actually requirement: “up to the last lesson” means when you open lesson 1 details you see info+ideas for all lessons (from lesson1 to 20).
    // But for flexibility and better UX, we implement: clicking any lesson will open a comprehensive syllabus page that includes
    // detailed info AND creative ideas for ALL lessons (from Lesson 1 to 20), plus the current clicked lesson highlighted.
    // However exactly matches: "Click Lesson 1 → opens Lesson 1 page and write info and ideas about the topics up to the last lesson"
    // So we will, when user clicks any lesson button, we display a master detail panel that contains full details and ideas covering lesson 1 through lesson 20,
    // and also shows a "focused lesson" header but all lessons appear. That fully fulfills "info and ideas about the topics up to the last lesson".
    const allBtns = document.querySelectorAll('.btn-lesson');
    allBtns.forEach(btn => {
      btn.removeEventListener('click', handleLessonClick);
      btn.addEventListener('click', handleLessonClick);
    });
  }

  function handleLessonClick(e) {
    const btn = e.currentTarget;
    const lessonIdx = parseInt(btn.getAttribute('data-lesson-idx'), 10);
    const clickedLesson = lessonsData[lessonIdx];
    const lessonNumber = lessonIdx + 1;
    
    // Build a comprehensive detail view that shows from lesson 1 to last (20)
    // along with info + ideas for each lesson.
    let allLessonsHTML = '';
    lessonsData.forEach((l, idx) => {
      const currentNum = idx + 1;
      // gather info bullets and ideas bullets
      const infoList = l.info ? l.info.map(inf => `<li style="margin-bottom:4px;">${escapeHtml(inf)}</li>`).join('') : '<li>Core info ready in class</li>';
      const ideasList = l.ideas ? l.ideas.map(idea => `<span class="idea-chip">✨ ${escapeHtml(idea)}</span>`).join('') : '<span class="idea-chip">✨ brainstorm creative code</span>';
      
      allLessonsHTML += `
        <div class="info-section" id="lesson-${currentNum}">
          <h4>📘 Lesson ${currentNum}: ${escapeHtml(l.title)}</h4>
          <div style="margin: 12px 0 6px;"><strong>🔍 Core Information</strong></div>
          <ul style="margin-left: 1.4rem; color: #2c3e4e;">${infoList}</ul>
          <div style="margin: 12px 0 6px;"><strong>💡 Creative Ideas & Project Sparks</strong></div>
          <div class="ideas-grid">
            ${ideasList}
          </div>
        </div>
      `;
    });
    
    // Inject detail panel with all lessons (up to last lesson 20)
    const panelRoot = document.getElementById('detailPanelRoot');
    panelRoot.innerHTML = `
      <div class="detail-card">
        <div class="detail-header">
          <h3>🔖 Full Syllabus Explorer: Lesson ${lessonNumber} “${escapeHtml(clickedLesson.title)}” + all 20 lessons</h3>
          <button class="close-detail" id="closeDetailBtn">✕</button>
        </div>
        <div class="detail-content">
          <div style="background: #eef2ff; padding: 0.8rem 1.2rem; border-radius: 20px; margin-bottom: 1.5rem;">
            ⚡ You clicked <strong>Lesson ${lessonNumber}</strong> — below find detailed info and creative ideas for <strong>every lesson from 1 to 20</strong> (full curriculum). 
            Master each topic, build real projects, and unlock web development mastery.
          </div>
          ${allLessonsHTML}
          <div class="footnote">
            🚀 Each lesson includes core knowledge + practical creative ideas. Build, remix, and share your projects!
          </div>
        </div>
      </div>
    `;
    
    // Close detail handler
    const closeBtn = document.getElementById('closeDetailBtn');
    if (closeBtn) {
      closeBtn.addEventListener('click', () => {
        panelRoot.innerHTML = '';
      });
    }
    
    // smooth scroll to panel
    panelRoot.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  
  // simple escape function
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // initial render
  renderCards();
</script>
</body>
</html>
